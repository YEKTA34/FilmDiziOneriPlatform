global:
  scrape_interval: 15s 

scrape_configs:
  - job_name: 'content-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['contentservice:8081'] 

  - job_name: 'review-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['reviewservice:8082']