spring:
  application:
    name: content-service
  
  datasource:
    
    url: jdbc:postgresql://film-db:5432/filmplatform
    username: yekta
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      
      ddl-auto: update
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true